{% extends 'store/base.html' %}

{% block content %}
<h2 class="mb-4">Products</h2>
<table class="table table-striped table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Product Name</th>
            <th>Category</th>
            <th>Price</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.0 }}</td>
            <td>{{ product.1 }}</td>
            <td>{{ product.3 }}</td>
            <td>₹{{ product.2 }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
